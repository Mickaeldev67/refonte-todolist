services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth:
    build: ./services/auth
    environment:
      PORT: 3001
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: auth_db
    depends_on:
      - mysql
    ports:
      - "3001:3001"

  tasks:
    build: ./services/tasks
    environment:
      PORT: 3002
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: task_db
      RABBIT_URL: amqp://rabbitmq:5672
      RABBIT_EXCHANGE: domain-events
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "3002:3002"

  projects:
    build: ./services/projects
    environment:
      PORT: 3003
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: project_db
      RABBIT_URL: amqp://rabbitmq:5672
      RABBIT_EXCHANGE: domain-events
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "3003:3003"

  gateway:
    build: ./gateway
    environment:
      PORT: 3000
      AUTH_URL: http://auth:3001
      TASKS_URL: http://tasks:3002
      PROJECTS_URL: http://projects:3003
      SESSION_SECRET: change-me
    depends_on:
      - auth
      - tasks
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: todolist-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data: